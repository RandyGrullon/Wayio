name: CI Mobile
on:
  push:
    branches: [main, develop]
    paths:
      - 'tripmind-mobile/**'
  pull_request:
    branches: [main]
    paths:
      - 'tripmind-mobile/**'
jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tripmind-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tripmind-mobile/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run format:check
